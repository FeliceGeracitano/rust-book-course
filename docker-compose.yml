services:
  app:
    build: .
    # Publish on the host loopback only — the file-write API must not be reachable
    # from the LAN. The container itself listens on 0.0.0.0 (BIND_ADDR below).
    ports:
      - "127.0.0.1:8080:8080"
    # Mount the editable source so your terminal edits + `cargo test` are live
    # without rebuilding the image. CARGO_TARGET_DIR points off the mount so the
    # container's Linux build artifacts never clash with host (macOS) ones.
    volumes:
      - ./chapters:/app/chapters
      - ./content:/app/content
    environment:
      CLIENT_DIR: /app/client/dist
      CONTENT_DIR: /app/content
      CHAPTERS_DIR: /app/chapters
      CARGO_TARGET_DIR: /cargo-target
      PORT: "8080"
      BIND_ADDR: 0.0.0.0
      # Used only to build an "open in editor" deep-link to the file on your host.
      # ${PWD} is the repo dir when you run `docker compose up`.
      HOST_REPO_DIR: ${PWD}
      EDITOR_SCHEME: ${EDITOR_SCHEME:-vscode}
      LSP_URL: ${LSP_URL:-ws://localhost:3030}

  lsp:
    build:
      context: .
      dockerfile: Dockerfile.lsp
    # Loopback only — like the main app, this must not be reachable from the LAN.
    ports:
      - "127.0.0.1:3030:3030"
    volumes:
      - ./chapters:/app/chapters
    environment:
      LSP_PORT: "3030"
      CHAPTERS_DIR: /app/chapters
      CARGO_TARGET_DIR: /ra-target
